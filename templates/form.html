<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Find My Doctor</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; }
        label { display: block; margin-top: 10px; }
        input[type="text"], textarea { width: 100%; padding: 8px; margin-top: 4px; }
        button { margin-top: 15px; padding: 8px 16px; }
        .card { border: 1px solid #ccc; padding: 15px; margin-top: 20px; border-radius: 4px; }
        .title { font-weight: bold; margin-bottom: 8px; }
    </style>
</head>
<body>
    <h1>Find My Doctor</h1>
    <form method="post">
        <label for="name">Name:</label>
        <input id="name" name="name" type="text" required>

        <label for="address">Address or ZIP:</label>
        <input id="address" name="address" type="text" required>

        <label for="problem">Describe your issue:</label>
        <textarea id="problem" name="problem" rows="4" required></textarea>

        <button type="submit">Get Recommendation</button>
    </form>

    {% if result %}
    <div class="card">
        <div class="title">Recommendation for {{ result.name }}:</div>
        <p><strong>Address/ZIP:</strong> {{ result.address }}</p>
        <p><strong>Your issue:</strong> {{ result.problem }}</p>
        <p><strong>My recommendation:</strong> {{ result.recommendation }}</p>
    </div>
    {% endif %}
</body>
</html>
